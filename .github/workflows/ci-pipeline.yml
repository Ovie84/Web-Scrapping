name: My first GitHub Action

on: 
  push: 
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ovie2604/video-downloader

          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/head/main' }}
            type=semver,pattern={{version}}
            type=sha,enable=true

      - name: Set up Docker Buildx
      # forcing actions to recognize typo "actions" => "action"
        uses: docker/setup-buildx-action@v3

      - name: Print a greeting message
        run: echo "Hello, GitHub Actions is working!"

      - name: Run a sample test script
        run: echo "Simulating automated tests..."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        # with:
        #   username: ${{ secrets.DOCKERHUB_USERNAME }}
        #   password: ${{ secrets.DOCKERHUB_TOKEN }}
        env: 
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with: 
          context: .
          push: true
          # tags: ovie2604/video-downloader:latest
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}